<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>RIVALS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;}

/* ─── SCREENS ─────────────────────────────────────────── */
.screen{position:fixed;inset:0;flex-direction:column;display:none;}
#s-menu{display:flex;}

/* ─── MENU ─────────────────────────────────────────────── */
#menu-bg{position:absolute;inset:0;background:linear-gradient(180deg,#0b1a2e 0%,#112211 55%,#080808 100%);}
/* animated stars */
#stars{position:absolute;inset:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.9;}}
#menu-top{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px;}
#logo-wrap .logo-text{font-size:34px;font-weight:900;letter-spacing:4px;color:#fff;text-shadow:0 0 24px rgba(255,255,255,.25);}
#logo-wrap .logo-text span{color:#e8c84a;}
#logo-wrap .version{font-size:11px;color:#666;margin-top:2px;}
.social-row{display:flex;gap:8px;}
.soc-btn{width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
.soc-btn:active{background:rgba(255,255,255,.18);}
#menu-mid{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;padding:10px 0;}
.hero-badge{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 20px;font-size:12px;color:#aaa;letter-spacing:1px;text-transform:uppercase;}
#menu-bottom{position:relative;z-index:2;padding:10px 14px 28px;}
#online-bar{display:flex;justify-content:space-between;font-size:11px;color:#666;padding:6px 8px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:10px;}
#online-bar .green{color:#4cff4c;font-weight:700;}
.btn-playnow{width:100%;padding:17px;background:linear-gradient(135deg,#27ae60,#2ecc71);border:none;border-radius:14px;color:#fff;font-size:19px;font-weight:900;letter-spacing:3px;cursor:pointer;margin-bottom:9px;text-transform:uppercase;box-shadow:0 4px 20px rgba(46,204,113,.35);}
.btn-playnow:active{transform:scale(.98);}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.btn-servers{padding:13px;background:linear-gradient(135deg,#1e6fa8,#2980b9);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
.btn-buyserver{padding:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#666;font-size:13px;font-weight:700;cursor:not-allowed;letter-spacing:1px;text-transform:uppercase;}
.btn-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-dark{padding:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#ccc;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
.btn-dark:active{background:rgba(255,255,255,.13);}

/* ─── SERVER LIST ───────────────────────────────────────── */
#s-servers{background:#0c0c0c;}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.back{width:36px;height:36px;background:rgba(255,255,255,.08);border:none;border-radius:8px;color:#fff;font-size:20px;cursor:pointer;}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
#region-tabs{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto;}
.rtab{padding:7px 15px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;color:#888;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;white-space:nowrap;}
.rtab.on{background:#2980b9;border-color:#2980b9;color:#fff;}
#srv-list{flex:1;overflow-y:auto;padding:10px 14px;}
.srv-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;margin-bottom:7px;}
.srv-name{font-size:14px;font-weight:700;}
.srv-cnt{font-size:12px;color:#888;margin-top:2px;}
.srv-cnt.full{color:#e74c3c;}
.join-btn{padding:9px 20px;background:linear-gradient(135deg,#27ae60,#2ecc71);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.join-btn:disabled{background:rgba(255,255,255,.08);color:#444;cursor:not-allowed;}
.join-btn:not(:disabled):active{transform:scale(.96);}

/* ─── ACCOUNT ───────────────────────────────────────────── */
#s-account{background:#111;}
.acc-form{padding:18px 16px;flex:1;overflow-y:auto;}
.f-label{font-size:12px;color:#999;margin-bottom:5px;display:block;}
.f-input{width:100%;padding:13px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:9px;color:#fff;font-size:14px;margin-bottom:13px;outline:none;}
.f-input:focus{border-color:#2980b9;}
.pw-row{position:relative;}
.eye-btn{position:absolute;right:12px;top:13px;background:none;border:none;color:#777;cursor:pointer;font-size:16px;}
.pw-hint{font-size:11px;color:#666;text-align:right;margin:-10px 0 12px;}
.f-err{color:#e74c3c;font-size:12px;min-height:18px;margin-bottom:8px;}
.f-links{font-size:11px;color:#777;margin-bottom:18px;line-height:1.8;}
.f-links a{color:#3498db;text-decoration:none;}
.acc-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-reg{padding:14px;background:#2980b9;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.btn-login{padding:14px;background:#27ae60;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.acc-loggedin{padding:20px 16px;}
.acc-user{font-size:22px;font-weight:800;margin:6px 0 14px;}
.acc-sub{font-size:12px;color:#888;}
.btn-logout{padding:12px 24px;background:#c0392b;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}

/* ─── GAME ──────────────────────────────────────────────── */
#s-game{background:#000;}
#gc{position:absolute;inset:0;width:100%;height:100%;display:block;}

/* ─── HUD ───────────────────────────────────────────────── */
#hud{position:absolute;inset:0;pointer-events:none;z-index:10;}

/* Top bar */
#hud-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;}
#srv-label{background:rgba(0,0,0,.55);padding:5px 12px;border-radius:8px;font-size:11px;color:#ccc;letter-spacing:1px;}
#top-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
#online-hud{background:rgba(0,0,0,.55);padding:5px 12px;border-radius:8px;font-size:11px;color:#ccc;}
#clock-hud{background:rgba(0,0,0,.55);padding:4px 10px;border-radius:8px;font-size:11px;color:#aaa;}

/* Kill feed */
#killfeed{position:absolute;top:80px;right:12px;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.kf-entry{background:rgba(0,0,0,.65);padding:5px 10px;border-radius:7px;font-size:11px;color:#fff;text-align:right;animation:kfIn .3s ease,kfOut .4s ease 3.6s forwards;}
@keyframes kfIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
@keyframes kfOut{to{opacity:0;}}
.kf-killer{color:#e8c84a;font-weight:700;}
.kf-victim{color:#e74c3c;}

/* Nearby player label */
#nearby-wrap{position:absolute;top:56px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);padding:6px 16px;border-radius:10px;text-align:center;display:none;pointer-events:none;}
#nearby-name{font-size:13px;font-weight:700;color:#fff;}
#nearby-hbar{width:110px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:4px;}
#nearby-hfill{height:100%;background:#2ecc40;border-radius:3px;transition:width .25s;}

/* Crosshair */
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;pointer-events:none;}
#xhair::before{content:'';position:absolute;left:50%;top:0;width:2px;height:100%;background:rgba(255,255,255,.8);transform:translateX(-50%);}
#xhair::after{content:'';position:absolute;top:50%;left:0;height:2px;width:100%;background:rgba(255,255,255,.8);transform:translateY(-50%);}
.xhair-dot{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}

/* Inventory */
#inv{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto;}
.isl{width:55px;height:55px;background:rgba(0,0,0,.65);border:2px solid rgba(255,255,255,.2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:border-color .15s,background .15s;}
.isl.active{border-color:#e8c84a;background:rgba(232,200,74,.18);}
.isl:active{transform:scale(.93);}
.isl-icon{font-size:23px;line-height:1;}
.isl-qty{position:absolute;bottom:3px;right:5px;font-size:10px;color:#ccc;font-weight:700;}
.isl-name{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:#aaa;white-space:nowrap;}

/* Status circles */
#bars{position:absolute;bottom:76px;right:12px;display:flex;gap:8px;pointer-events:none;}
.circle-bar{width:50px;height:50px;position:relative;display:flex;align-items:center;justify-content:center;}
.circle-bar canvas{position:absolute;inset:0;}
.circle-val{font-size:11px;font-weight:800;z-index:1;color:#fff;}

/* Joystick */
#joy-zone{position:absolute;bottom:84px;left:16px;width:114px;height:114px;pointer-events:auto;}
#joy-base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,.09);border:2px solid rgba(255,255,255,.22);position:relative;}
#joy-thumb{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.38);border:2px solid rgba(255,255,255,.7);top:50%;left:50%;transform:translate(-50%,-50%);}
#sprint-tag{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase;}

/* Action buttons */
#act-btns{position:absolute;bottom:84px;right:12px;display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:auto;}
.act-btn{border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;-webkit-tap-highlight-color:transparent;}
.act-btn:active{background:rgba(255,255,255,.15);}
#btn-attack{width:60px;height:60px;font-size:24px;background:rgba(160,20,20,.6);border-color:rgba(255,60,60,.5);}
#btn-jump{width:54px;height:54px;font-size:17px;background:rgba(20,80,160,.6);border-color:rgba(60,140,255,.5);}
#btn-cfg{width:34px;height:34px;font-size:15px;background:rgba(0,0,0,.45);}

/* Hands */
#hands{position:absolute;bottom:0;left:0;right:0;height:38%;pointer-events:none;display:flex;justify-content:space-between;align-items:flex-end;padding:0 4%;}
#hl,#hr{width:20%;max-width:95px;}
#hl img,#hr img{width:100%;filter:drop-shadow(0 6px 10px rgba(0,0,0,.9));}
#hr{transform:scaleX(-1);}
@keyframes atkL{0%{transform:translateY(0) rotate(0);}35%{transform:translateY(-32px) rotate(-20deg);}100%{transform:translateY(0) rotate(0);}}
@keyframes atkR{0%{transform:scaleX(-1) translateY(0);}35%{transform:scaleX(-1) translateY(-32px) rotate(20deg);}100%{transform:scaleX(-1) translateY(0);}}
@keyframes eatAnim{0%{transform:translateY(0);}40%{transform:translateY(-24px);}100%{transform:translateY(0);}}
.do-atkL{animation:atkL .28s ease;}
.do-atkR{animation:atkR .28s ease;}
.do-eat{animation:eatAnim .45s ease;}

/* Death screen */
#death-screen{position:absolute;inset:0;background:rgba(160,0,0,.45);display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:64px 20px 88px;z-index:60;pointer-events:none;}
#death-screen.on{display:flex;pointer-events:auto;}
#death-msg{font-size:18px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);text-align:center;background:rgba(0,0,0,.45);padding:12px 20px;border-radius:12px;max-width:90%;}
#death-cd{font-size:52px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(255,80,80,.9);}
#btn-respawn{padding:17px 44px;background:linear-gradient(135deg,#27ae60,#2ecc71);border:none;border-radius:14px;color:#fff;font-size:21px;font-weight:900;cursor:pointer;display:none;letter-spacing:2px;box-shadow:0 4px 18px rgba(46,204,113,.4);}
#btn-respawn.vis{display:block;}

/* Settings panel */
#cfg-overlay{position:absolute;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:100;pointer-events:none;}
#cfg-overlay.on{display:flex;pointer-events:auto;}
#cfg-box{background:#1c1c1c;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:28px 22px;min-width:220px;text-align:center;}
#cfg-box h3{font-size:15px;font-weight:800;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase;color:#ccc;}
#btn-leave{width:100%;padding:14px;background:#c0392b;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;}
#btn-close-cfg{width:100%;padding:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;color:#999;font-size:13px;cursor:pointer;}

/* Toast */
#toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(200,40,40,.9);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:210;}
#toast.on{opacity:1;}

/* Notif */
#notif{position:absolute;top:108px;right:12px;background:rgba(0,0,0,.7);color:#ddd;padding:7px 12px;border-radius:8px;font-size:11px;opacity:0;transition:opacity .25s;pointer-events:none;max-width:180px;text-align:right;z-index:210;}
#notif.on{opacity:1;}

/* Hit flash */
#hit-flash{position:absolute;inset:0;background:rgba(255,0,0,.25);pointer-events:none;opacity:0;transition:opacity .15s;z-index:55;}
#hit-flash.on{opacity:1;}

/* Ammo counter */
#ammo-hud{position:absolute;bottom:140px;right:14px;text-align:right;pointer-events:none;}
#ammo-count{font-size:22px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.8);}
#ammo-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;}

/* Active item name */
#item-name{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:700;color:rgba(255,255,255,.75);background:rgba(0,0,0,.45);padding:4px 12px;border-radius:6px;pointer-events:none;text-align:center;}

/* Scroll tip */
#scroll-tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;color:rgba(255,255,255,.5);background:rgba(0,0,0,.5);padding:6px 14px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:15;white-space:nowrap;}
#scroll-tip.on{opacity:1;}
</style>
</head>
<body>

<!-- ═══════════ MENU ═══════════ -->
<div id="s-menu" class="screen">
  <div id="menu-bg"></div>
  <div id="stars"></div>
  <div id="menu-top">
    <div id="logo-wrap">
      <div class="logo-text">RIVAL<span>S</span></div>
      <div class="version">v1.0.0 BETA</div>
    </div>
    <div class="social-row">
      <div class="soc-btn" title="Discord">💬</div>
      <div class="soc-btn" title="Leaderboard">🏆</div>
      <div class="soc-btn" title="News">📢</div>
    </div>
  </div>
  <div id="menu-mid">
    <div class="hero-badge">🌍 Multiplayer Survival · 40 Servers · 25 Players Each</div>
  </div>
  <div id="menu-bottom">
    <div id="online-bar">
      <span>🟢 <span class="green" id="total-online">0</span> Online</span>
      <span id="ver-bar">v1.0.0 BETA &nbsp;·&nbsp; Privacy</span>
    </div>
    <button class="btn-playnow" id="btn-main">PLAY NOW ›</button>
    <div class="btn-row">
      <button class="btn-servers" onclick="gotoServers()">⚔ SERVERS</button>
      <button class="btn-buyserver">🖥 BUY SERVER</button>
    </div>
    <div class="btn-row2" style="margin-top:8px;">
      <button class="btn-dark" onclick="gotoAccount()">👤 ACCOUNT</button>
      <button class="btn-dark" onclick="alert('Settings coming soon!')">⚙ SETTINGS</button>
    </div>
  </div>
</div>

<!-- ═══════════ SERVERS ═══════════ -->
<div id="s-servers" class="screen">
  <div class="hdr">
    <button class="back" onclick="gotoMenu()">‹</button>
    <div class="hdr-title">⚔ SERVERS</div>
  </div>
  <div id="region-tabs">
    <div class="rtab on" onclick="setRegion('ALL',this)">ALL</div>
    <div class="rtab" onclick="setRegion('AS',this)">🌏 AS</div>
    <div class="rtab" onclick="setRegion('EU',this)">🌍 EU</div>
    <div class="rtab" onclick="setRegion('NA',this)">🌎 NA</div>
    <div class="rtab" onclick="setRegion('SA',this)">🌎 SA</div>
  </div>
  <div id="srv-list"></div>
</div>

<!-- ═══════════ ACCOUNT ═══════════ -->
<div id="s-account" class="screen">
  <div class="hdr">
    <button class="back" onclick="gotoMenu()">‹</button>
    <div class="hdr-title">👤 ACCOUNT</div>
  </div>
  <div id="acc-body"></div>
</div>

<!-- ═══════════ GAME ═══════════ -->
<div id="s-game" class="screen">
  <canvas id="gc"></canvas>

  <div id="hud">
    <!-- Top -->
    <div id="hud-top">
      <div id="srv-label">--</div>
      <div id="top-right">
        <div id="online-hud">0 Online</div>
        <div id="clock-hud">00:00</div>
      </div>
    </div>

    <!-- Kill feed -->
    <div id="killfeed"></div>

    <!-- Nearby player -->
    <div id="nearby-wrap">
      <div id="nearby-name">Player</div>
      <div id="nearby-hbar"><div id="nearby-hfill" style="width:100%"></div></div>
    </div>

    <!-- Crosshair -->
    <div id="xhair"><div class="xhair-dot"></div></div>

    <!-- Active item name -->
    <div id="item-name">Musket</div>

    <!-- Ammo HUD -->
    <div id="ammo-hud">
      <div id="ammo-count">30</div>
      <div id="ammo-label">ammo</div>
    </div>

    <!-- Inventory -->
    <div id="inv">
      <div class="isl active" id="sl0" onclick="swapSlot(0)"><span class="isl-icon">🔫</span><span class="isl-name">Musket</span></div>
      <div class="isl" id="sl1" onclick="swapSlot(1)"><span class="isl-icon">🔮</span><span class="isl-qty" id="qty1">30</span><span class="isl-name">Ammo</span></div>
      <div class="isl" id="sl2" onclick="swapSlot(2)"><span class="isl-icon">🍖</span><span class="isl-qty" id="qty2">5</span><span class="isl-name">Meat</span></div>
      <div class="isl" id="sl3" onclick="swapSlot(3)"></div>
      <div class="isl" id="sl4" onclick="swapSlot(4)"></div>
    </div>

    <!-- Status bars -->
    <div id="bars">
      <div class="circle-bar"><canvas id="cHunger" width="50" height="50"></canvas><div class="circle-val" id="vHunger" style="color:#ff9500">100</div></div>
      <div class="circle-bar"><canvas id="cHealth" width="50" height="50"></canvas><div class="circle-val" id="vHealth" style="color:#ff4444">100</div></div>
    </div>

    <!-- Joystick -->
    <div id="joy-zone">
      <div id="joy-base">
        <div id="sprint-tag">SPRINT</div>
        <div id="joy-thumb"></div>
      </div>
    </div>

    <!-- Action buttons -->
    <div id="act-btns">
      <button class="act-btn" id="btn-cfg" onclick="toggleCfg()">⚙</button>
      <button class="act-btn" id="btn-jump" onclick="doJump()">⬆⬆</button>
      <button class="act-btn" id="btn-attack" onclick="doAction()">🪓</button>
    </div>

    <!-- Hands -->
    <div id="hands">
      <div id="hl"><img src="https://em-content.zobj.net/source/apple/354/raised-back-of-hand_1f91a.png" alt=""/></div>
      <div id="hr"><img src="https://em-content.zobj.net/source/apple/354/raised-back-of-hand_1f91a.png" alt=""/></div>
    </div>

    <!-- Hit flash -->
    <div id="hit-flash"></div>
  </div>

  <!-- Death -->
  <div id="death-screen">
    <div id="death-msg">You were killed</div>
    <div id="death-cd">10</div>
    <button id="btn-respawn" onclick="doRespawn()">RESPAWN</button>
  </div>

  <!-- Settings overlay -->
  <div id="cfg-overlay">
    <div id="cfg-box">
      <h3>⚙ Settings</h3>
      <button id="btn-leave" onclick="leaveServer()">🚪 Leave Server</button>
      <button id="btn-close-cfg" onclick="toggleCfg()">Close</button>
    </div>

  <!-- Toast / Notif -->

<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════════
let socket = null;
let currentUser = null;
let rooms = [];
let regionFilter = 'ALL';
let lastRoom = localStorage.getItem('lastRoom');
let visited = !!localStorage.getItem('visited');

// Game
let renderer, scene, camera;
let playerMeshes = {}, bulletMeshes = {};
let animId = null;
let lastFrameTs = 0;

const MAP = 900, SCALE = 0.045;
let myX = 200*SCALE, myZ = 200*SCALE;
let camYaw = 0, camPitch = 0;
let camH = 1.75;
let isJumping = false, jumpV = 0;
let isSprinting = false;
let lastSent = 0;

// Joy
let joyActive = false, joyOrigin = {x:0,y:0}, joyDelta = {x:0,y:0}, joyForce = 0;
// Look touch
let lookId = null, lookLast = {x:0,y:0};

let gs = {
  roomId:null, myId:null, myPlayer:null, players:{},
  health:100, hunger:100, isDead:false,
  inventory:[], activeSlot:0,
  deathTimer:null, countdown:10
};

// ═══════════════════════════════════════════════════
// STARS (menu)
// ═══════════════════════════════════════════════════
(function makeStars(){
  const c = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+0.5;
    Object.assign(s.style,{
      width:sz+'px',height:sz+'px',
      left:Math.random()*100+'%',top:Math.random()*100+'%',
      animationDuration:(2+Math.random()*4)+'s',
      animationDelay:(Math.random()*4)+'s'
    });
    c.appendChild(s);
  }
})();

// ═══════════════════════════════════════════════════
// SOCKET
// ═══════════════════════════════════════════════════
function initSocket(){
  if(socket) return;
  socket = io();
  socket.on('roomList', data => { rooms=data; updateOnlineTotal(); renderSrvList(); });
  socket.on('joinedRoom', onJoinedRoom);
  socket.on('playerJoined', p => { gs.players[p.id]=p; addPMesh(p); showNotif(`${p.name} joined`); });
  socket.on('playerLeft', id => { if(gs.players[id]) showNotif(`${gs.players[id].name} left`); removePMesh(id); delete gs.players[id]; });
  socket.on('playerMoved', d => {
    if(gs.players[d.id]){Object.assign(gs.players[d.id],{x:d.x,z:d.z,rotY:d.rotY,isMoving:d.isMoving,isSprinting:d.isSprinting});}
    const m=playerMeshes[d.id]; if(m){ m.group.position.set(d.x*SCALE,0,d.z*SCALE); m.group.rotation.y=d.rotY; m.isMoving=d.isMoving; m.isSprinting=d.isSprinting; }
  });
  socket.on('bulletFired', b => { gs.players; addBMesh(b); });
  socket.on('bulletDestroyed', id => removeBMesh(id));
  socket.on('playerHit', d => {
    if(gs.players[d.id]) gs.players[d.id].health=d.health;
    if(d.id===gs.myId){ gs.health=d.health; updateBars(); flashHit(); }
    if(gs.nearbyId===d.id) updateNearbyBar(d.health);
  });
  socket.on('playerStatsChanged', d => { if(gs.players[d.id]) gs.players[d.id].health=d.health; });
  socket.on('killFeed', d => addKillFeed(d.killer, d.victim, d.weapon));
  socket.on('playerDied', d => { removePMesh(d.id); if(gs.players[d.id]) delete gs.players[d.id]; });
  socket.on('youDied', d => triggerDeath(d.killedBy, d.weapon));
  socket.on('statsUpdate', d => { gs.health=d.health; gs.hunger=d.hunger; updateBars(); });
  socket.on('inventoryUpdate', inv => { gs.inventory=inv; renderInv(); updateAmmoHud(); });
  socket.on('noAmmo', msg => toast(msg));
  socket.on('slotSwitched', i => { gs.activeSlot=i; renderInv(); updateAmmoHud(); updateItemName(); });
  socket.on('gameError', msg => toast(msg));
}

// ═══════════════════════════════════════════════════
// SCREEN NAVIGATION
// ═══════════════════════════════════════════════════
function show(id){
  const screens=['s-menu','s-servers','s-account','s-game'];
  screens.forEach(s=>{
    const el=document.getElementById(s);
    if(!el) return;
    if(s===id){
      el.style.setProperty('display','flex','important');
      el.style.visibility='visible';
    } else {
      el.style.setProperty('display','none','important');
      el.style.visibility='hidden';
    }
  });
}
function gotoMenu(){ show('s-menu'); updateMainBtn(); }
function gotoServers(){ initSocket(); show('s-servers'); renderSrvList(); }
function gotoAccount(){ show('s-account'); renderAcc(); }

function updateMainBtn(){
  const btn=document.getElementById('btn-main');
  if(lastRoom && visited){
    btn.textContent='CONTINUE ›';
    btn.onclick=()=>joinRoom(lastRoom);
  } else {
    btn.textContent='PLAY NOW ›';
    btn.onclick=joinRandom;
  }
}

function updateOnlineTotal(){
  const n=rooms.reduce((a,r)=>a+r.playerCount,0);
  const el=document.getElementById('total-online'); if(el) el.textContent=n;
}

// ═══════════════════════════════════════════════════
// SERVER LIST
// ═══════════════════════════════════════════════════
function setRegion(r, el){
  regionFilter=r;
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderSrvList();
}
function renderSrvList(){
  const el=document.getElementById('srv-list'); if(!el) return;
  const list=regionFilter==='ALL'?rooms:rooms.filter(r=>r.region===regionFilter);
  el.innerHTML=list.map(r=>`
    <div class="srv-row">
      <div><div class="srv-name">${r.id}</div><div class="srv-cnt ${r.full?'full':''}">${r.playerCount} / 25 players${r.full?' · FULL':''}</div></div>
      <button class="join-btn" ${r.full?'disabled':''} onclick="joinRoom('${r.id}')">Join</button>
    </div>`).join('');
}
function joinRoom(id){
  initSocket();
  socket.emit('joinRoom',{roomId:id,username:currentUser?.username||null});
  localStorage.setItem('lastRoom',id); lastRoom=id; visited=true; localStorage.setItem('visited','1');
}
function joinRandom(){
  initSocket();
  const avail=rooms.filter(r=>!r.full);
  if(!avail.length){toast('All servers are full!');return;}
  joinRoom(avail[Math.floor(Math.random()*avail.length)].id);
}

// ═══════════════════════════════════════════════════
// ACCOUNT
// ═══════════════════════════════════════════════════
function renderAcc(){
  const el=document.getElementById('acc-body');
  if(currentUser){
    el.innerHTML=`<div class="acc-loggedin"><div class="acc-sub">Logged in as</div><div class="acc-user">${currentUser.username}</div><button class="btn-logout" onclick="doLogout()">Logout</button></div>`;
  } else {
    el.innerHTML=`<div class="acc-form">
      <label class="f-label">Username *</label>
      <input class="f-input" id="uname" placeholder="EnterUsername" maxlength="20" oninput="valUname(this)"/>
      <label class="f-label">Password * <span style="float:right;font-size:11px;color:#666;">Strength: <span id="pw-str">—</span></span></label>
      <div class="pw-row"><input class="f-input" id="upw" type="password" placeholder="Password" oninput="checkStr(this)"/><button class="eye-btn" onclick="toggleEye()">👁</button></div>
      <div class="f-err" id="f-err"></div>
      <div class="f-links"><a href="#">Forgot your password? Click here to reset.</a><br/><a href="#">Privacy policy</a></div>
      <div style="font-size:12px;color:#777;text-align:center;margin-bottom:12px;">Don't have an account?</div>
      <div class="acc-btns"><button class="btn-reg" onclick="doReg()">REGISTER</button><button class="btn-login" onclick="doLogin()">LOGIN</button></div>
    </div>`;
  }
}
function valUname(inp){
  if(!/^[a-zA-Z0-9]*$/.test(inp.value)){
    inp.value=inp.value.replace(/[^a-zA-Z0-9]/g,'');
    setErr('Username must contain only numbers and letters');
  } else setErr('');
}
function checkStr(inp){
  const v=inp.value,el=document.getElementById('pw-str'); if(!el) return;
  el.textContent=v.length<4?'Weak':v.length<8?'Fair':/[A-Z]/.test(v)&&/[0-9]/.test(v)?'Strong':'Good';
}
function toggleEye(){const i=document.getElementById('upw');if(i)i.type=i.type==='password'?'text':'password';}
function setErr(msg){const e=document.getElementById('f-err');if(e)e.textContent=msg;}
function doReg(){
  const u=document.getElementById('uname')?.value.trim();
  const p=document.getElementById('upw')?.value;
  if(!u||u.length<3){setErr('Min 3 characters');return;}
  if(!/^[a-zA-Z0-9]+$/.test(u)){setErr('Letters and numbers only');return;}
  if(!p||p.length<4){setErr('Password min 4 characters');return;}
  const db=JSON.parse(localStorage.getItem('rv_users')||'{}');
  if(db[u]){setErr('Username already taken');return;}
  db[u]={pw:p}; localStorage.setItem('rv_users',JSON.stringify(db));
  currentUser={username:u}; localStorage.setItem('rv_sess',JSON.stringify(currentUser));
  renderAcc();
}
function doLogin(){
  const u=document.getElementById('uname')?.value.trim();
  const p=document.getElementById('upw')?.value;
  const db=JSON.parse(localStorage.getItem('rv_users')||'{}');
  if(!db[u]||db[u].pw!==p){setErr('Invalid username or password');return;}
  currentUser={username:u}; localStorage.setItem('rv_sess',JSON.stringify(currentUser));
  renderAcc();
}
function doLogout(){currentUser=null;localStorage.removeItem('rv_sess');renderAcc();}

// ═══════════════════════════════════════════════════
// JOINED ROOM → START GAME
// ═══════════════════════════════════════════════════
function onJoinedRoom(data){
  gs.roomId=data.roomId; gs.myId=data.playerId;
  gs.myPlayer=data.player; gs.players=data.players;
  gs.inventory=data.player.inventory;
  gs.health=data.player.health; gs.hunger=data.player.hunger;
  gs.isDead=false; gs.activeSlot=0;
  myX=data.player.x*SCALE; myZ=data.player.z*SCALE;
  show('s-game');
  if(!renderer) initThree();
  clearMeshes();
  Object.values(gs.players).forEach(p=>{ if(p.id!==gs.myId) addPMesh(p); });
  setupJoy(); setupLook();
  updateBars(); renderInv(); updateAmmoHud(); updateItemName();
  document.getElementById('srv-label').textContent=gs.roomId;
  startClock();
  if(animId) cancelAnimationFrame(animId);
  animId=null; lastFrameTs=0;
  reqFrame();
  // Show look tip briefly
  const tip=document.getElementById('scroll-tip');
  tip.classList.add('on'); setTimeout(()=>tip.classList.remove('on'),3000);
}

// ═══════════════════════════════════════════════════
// THREE.JS INIT
// ═══════════════════════════════════════════════════
function initThree(){
  const canvas=document.getElementById('gc');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87ceeb);
  scene.fog=new THREE.Fog(0x87ceeb,18,50);

  camera=new THREE.PerspectiveCamera(72,window.innerWidth/window.innerHeight,0.05,55);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff,0.65));
  const sun=new THREE.DirectionalLight(0xfff4d0,1.1);
  sun.position.set(18,35,18); sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  ['left','right','top','bottom'].forEach((k,i)=>sun.shadow.camera[k]=[−35,35,35,−35][i]);
  sun.shadow.camera.near=1; sun.shadow.camera.far=80;
  scene.add(sun);

  // Ground — green with grid
  const gGeo=new THREE.PlaneGeometry(MAP*SCALE,MAP*SCALE,40,40);
  const gMat=new THREE.MeshLambertMaterial({color:0x4a7c30});
  const ground=new THREE.Mesh(gGeo,gMat);
  ground.rotation.x=-Math.PI/2;
  ground.position.set(MAP*SCALE/2,0,MAP*SCALE/2);
  ground.receiveShadow=true;
  scene.add(ground);

  // Subtle grid overlay
  const grid=new THREE.GridHelper(MAP*SCALE,50,0xffffff,0xffffff);
  grid.position.set(MAP*SCALE/2,0.01,MAP*SCALE/2);
  grid.material.opacity=0.08; grid.material.transparent=true;
  scene.add(grid);

  // Walls
  const wMat=new THREE.MeshLambertMaterial({color:0x8a8a8a});
  const mw=MAP*SCALE, wt=0.9, wh=3.5;
  [
    [mw+wt*2,wh,wt, mw/2,wh/2,-wt/2],
    [mw+wt*2,wh,wt, mw/2,wh/2,mw+wt/2],
    [wt,wh,mw,      -wt/2,wh/2,mw/2],
    [wt,wh,mw,      mw+wt/2,wh/2,mw/2]
  ].forEach(([w,h,d,x,y,z])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wMat);
    m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
    scene.add(m);
  });

  // Wall top trim (grey stripe)
  const trimMat=new THREE.MeshLambertMaterial({color:0xaaaaaa});
  [
    [mw+wt*2,0.2,wt, mw/2,wh+0.1,-wt/2],
    [mw+wt*2,0.2,wt, mw/2,wh+0.1,mw+wt/2],
    [wt,0.2,mw,      -wt/2,wh+0.1,mw/2],
    [wt,0.2,mw,      mw+wt/2,wh+0.1,mw/2]
  ].forEach(([w,h,d,x,y,z])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),trimMat);
    m.position.set(x,y,z); scene.add(m);
  });

  window.addEventListener('resize',()=>{
    renderer.setSize(window.innerWidth,window.innerHeight);
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
  });
}

function clearMeshes(){
  Object.keys(playerMeshes).forEach(id=>removePMesh(id));
  Object.keys(bulletMeshes).forEach(id=>removeBMesh(id));
}

// ═══════════════════════════════════════════════════
// PLAYER MESH — Minecraft blocky style
// ═══════════════════════════════════════════════════
const PCOLORS=[0xe74c3c,0x3498db,0x2ecc71,0xe67e22,0x9b59b6,0x1abc9c,0xf1c40f,0xe91e63,0x00bcd4,0xff5722];
let colorIdx=0;

function addPMesh(p){
  if(p.id===gs.myId||playerMeshes[p.id]) return;
  const col=PCOLORS[colorIdx++%PCOLORS.length];
  const mat=new THREE.MeshLambertMaterial({color:col});
  const dark=new THREE.MeshLambertMaterial({color:new THREE.Color(col).multiplyScalar(0.65)});
  const g=new THREE.Group();

  // Body
  mk(g,new THREE.BoxGeometry(0.5,0.65,0.28),mat,[0,0.9,0]);
  // Head
  mk(g,new THREE.BoxGeometry(0.44,0.44,0.44),mat,[0,1.48,0]);
  // Eyes (white)
  const eyeM=new THREE.MeshBasicMaterial({color:0xffffff});
  mk(g,new THREE.BoxGeometry(0.1,0.08,0.01),eyeM,[-0.12,1.52,0.22]);
  mk(g,new THREE.BoxGeometry(0.1,0.08,0.01),eyeM,[0.12,1.52,0.22]);
  // Arms
  mk(g,new THREE.BoxGeometry(0.18,0.58,0.18),dark,[-0.34,0.9,0]);
  mk(g,new THREE.BoxGeometry(0.18,0.58,0.18),dark,[0.34,0.9,0]);
  // Legs
  mk(g,new THREE.BoxGeometry(0.21,0.58,0.21),dark,[-0.14,0.29,0]);
  mk(g,new THREE.BoxGeometry(0.21,0.58,0.21),dark,[0.14,0.29,0]);

  // Name sprite
  const nc=document.createElement('canvas'); nc.width=256; nc.height=52;
  const nx=nc.getContext('2d');
  nx.fillStyle='rgba(0,0,0,.65)'; nx.beginPath(); nx.roundRect(0,0,256,52,8); nx.fill();
  nx.fillStyle='#fff'; nx.font='bold 21px Segoe UI'; nx.textAlign='center'; nx.textBaseline='middle';
  nx.fillText(p.name||'Player',128,26);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(nc),transparent:true}));
  sp.scale.set(1.4,0.28,1); sp.position.y=2.0; sp.userData.isLabel=true;
  g.add(sp);

  // Health bar sprite
  const hc=document.createElement('canvas'); hc.width=128; hc.height=14;
  const hx=hc.getContext('2d');
  hx.fillStyle='rgba(0,0,0,.5)'; hx.fillRect(0,0,128,14);
  hx.fillStyle='#2ecc40'; hx.fillRect(2,2,124,10);
  const hsp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(hc),transparent:true}));
  hsp.scale.set(1.2,0.14,1); hsp.position.y=1.76; hsp.userData.isHpBar=true;
  hsp.userData.canvas=hc; hsp.userData.ctx=hx;
  g.add(hsp);

  g.castShadow=true;
  g.position.set(p.x*SCALE,0,p.z*SCALE);
  g.rotation.y=p.rotY||0;
  scene.add(g);
  playerMeshes[p.id]={group:g,isMoving:false,isSprinting:false,animT:0};
}
function mk(group,geo,mat,pos){
  const m=new THREE.Mesh(geo,mat);
  m.position.set(...pos); m.castShadow=true; group.add(m);
}
function removePMesh(id){
  const e=playerMeshes[id]; if(!e) return;
  scene.remove(e.group); e.group.traverse(c=>{if(c.geometry)c.geometry.dispose();});
  delete playerMeshes[id];
}
function updatePHealth(id,hp){
  const e=playerMeshes[id]; if(!e) return;
  e.group.children.forEach(c=>{
    if(c.userData.isHpBar){
      const ctx=c.userData.ctx, cv=c.userData.canvas;
      ctx.clearRect(0,0,128,14);
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(0,0,128,14);
      const pct=Math.max(0,hp)/100;
      ctx.fillStyle=pct>0.5?'#2ecc40':pct>0.25?'#f39c12':'#e74c3c';
      ctx.fillRect(2,2,Math.round(124*pct),10);
      c.material.map.needsUpdate=true;
    }
  });
}

// ═══════════════════════════════════════════════════
// BULLET MESHES
// ═══════════════════════════════════════════════════
function addBMesh(b){
  const geo=new THREE.SphereGeometry(0.055,6,6);
  const mat=new THREE.MeshBasicMaterial({color:0xffee44});
  const mesh=new THREE.Mesh(geo,mat);
  // Trail
  const tGeo=new THREE.CylinderGeometry(0.02,0.02,0.3,4);
  const tMat=new THREE.MeshBasicMaterial({color:0xff9900,transparent:true,opacity:0.5});
  const trail=new THREE.Mesh(tGeo,tMat);
  trail.rotation.x=Math.PI/2;
  mesh.add(trail);
  mesh.position.set(b.x*SCALE,camH*0.72,b.z*SCALE);
  scene.add(mesh);
  bulletMeshes[b.id]={mesh,dirX:b.dirX,dirZ:b.dirZ};
}
function removeBMesh(id){
  const e=bulletMeshes[id]; if(!e) return;
  scene.remove(e.mesh); e.mesh.geometry.dispose();
  delete bulletMeshes[id];
}
function tickBullets(){
  const spd=20*SCALE;
  Object.values(bulletMeshes).forEach(e=>{
    e.mesh.position.x+=e.dirX*spd;
    e.mesh.position.z+=e.dirZ*spd;
  });
}

// ═══════════════════════════════════════════════════
// JOYSTICK
// ═══════════════════════════════════════════════════
function setupJoy(){
  const zone=document.getElementById('joy-zone');
  const thumb=document.getElementById('joy-thumb');
  const onS=e=>{
    e.preventDefault(); joyActive=true;
    const r=zone.getBoundingClientRect();
    joyOrigin={x:r.left+r.width/2,y:r.top+r.height/2};
  };
  const onM=e=>{
    e.preventDefault(); if(!joyActive) return;
    const t=e.touches[0];
    const dx=t.clientX-joyOrigin.x, dy=t.clientY-joyOrigin.y;
    const dist=Math.min(Math.sqrt(dx*dx+dy*dy),44);
    const ang=Math.atan2(dy,dx);
    joyDelta={x:Math.cos(ang)*dist/44, y:Math.sin(ang)*dist/44};
    joyForce=dist/44;
    isSprinting=dist/44>0.84;
    thumb.style.transform=`translate(calc(-50% + ${Math.cos(ang)*dist}px),calc(-50% + ${Math.sin(ang)*dist}px))`;
  };
  const onE=()=>{
    joyActive=false; joyDelta={x:0,y:0}; joyForce=0; isSprinting=false;
    thumb.style.transform='translate(-50%,-50%)';
  };
  zone.addEventListener('touchstart',onS,{passive:false});
  zone.addEventListener('touchmove',onM,{passive:false});
  zone.addEventListener('touchend',onE);
  zone.addEventListener('touchcancel',onE);
}

// ═══════════════════════════════════════════════════
// LOOK TOUCH
// ═══════════════════════════════════════════════════
function setupLook(){
  const cv=document.getElementById('gc');
  cv.addEventListener('touchstart',e=>{
    if(gs.isDead) return;
    for(const t of e.changedTouches){
      if(lookId===null&&!onHUD(t)){ lookId=t.identifier; lookLast={x:t.clientX,y:t.clientY}; }
    }
  },{passive:true});
  cv.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===lookId){
        camYaw-=(t.clientX-lookLast.x)*0.004;
        lookLast={x:t.clientX,y:t.clientY};
      }
    }
  },{passive:true});
  cv.addEventListener('touchend',e=>{for(const t of e.changedTouches) if(t.identifier===lookId) lookId=null;});
  cv.addEventListener('touchcancel',e=>{for(const t of e.changedTouches) if(t.identifier===lookId) lookId=null;});
}
function onHUD(t){
  return ['joy-zone','act-btns','inv','bars'].some(id=>{
    const el=document.getElementById(id); if(!el) return false;
    const r=el.getBoundingClientRect();
    return t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom;
  });
}

// ═══════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════
function reqFrame(){ animId=requestAnimationFrame(loop); }
function loop(ts){
  animId=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastFrameTs)/1000,0.05); lastFrameTs=ts;
  if(!gs.isDead) move(dt);
  tickBullets();
  animOtherPlayers(ts);
  checkNearby();
  updateClock();
  // Camera
  camera.position.set(myX, camH+(isJumping?Math.max(0,jumpV*0.3):0), myZ);
  camera.rotation.order='YXZ';
  camera.rotation.y=camYaw;
  camera.rotation.x=0;
  renderer.render(scene,camera);
}

function move(dt){
  if(!joyActive&&joyForce===0) return;
  const spd=isSprinting?9:5;
  const fx=Math.sin(camYaw), fz=Math.cos(camYaw);
  const rx=Math.cos(camYaw), rz=-Math.sin(camYaw);
  const mx=(-joyDelta.x*rx - joyDelta.y*fx)*spd*dt;
  const mz=(-joyDelta.x*rz - joyDelta.y*fz)*spd*dt;
  const margin=1.1, mw=MAP*SCALE;
  myX=Math.max(margin,Math.min(mw-margin,myX+mx));
  myZ=Math.max(margin,Math.min(mw-margin,myZ+mz));
  // Jump physics
  if(isJumping){ jumpV-=18*dt; camH=Math.max(1.75,1.75+jumpV*dt*1.5); if(camH<=1.75){isJumping=false;jumpV=0;camH=1.75;} }
  // Send
  const now=Date.now();
  if(now-lastSent>50){ lastSent=now;
    socket.emit('playerMove',{x:myX/SCALE,z:myZ/SCALE,rotY:camYaw,isMoving:joyForce>0.1,isSprinting});
  }
}

function animOtherPlayers(ts){
  Object.entries(playerMeshes).forEach(([id,e])=>{
    if(e.isMoving){
      e.animT+=e.isSprinting?0.016:0.01;
      const sw=Math.sin(e.animT*60);
      const ch=e.group.children;
      if(ch[5]) ch[5].rotation.x=sw*0.55; // lLeg
      if(ch[6]) ch[6].rotation.x=-sw*0.55; // rLeg
      if(ch[3]) ch[3].rotation.x=-sw*0.45; // lArm
      if(ch[4]) ch[4].rotation.x=sw*0.45;  // rArm
    } else {
      [3,4,5,6].forEach(i=>{ if(e.group.children[i]) e.group.children[i].rotation.x*=0.85; });
    }
    // Labels face cam
    e.group.children.forEach(c=>{ if((c.userData.isLabel||c.userData.isHpBar)&&camera) c.quaternion.copy(camera.quaternion); });
  });
}

gs.nearbyId=null;
function checkNearby(){
  let closest=null, bestDist=6;
  Object.values(gs.players).forEach(p=>{
    if(p.id===gs.myId) return;
    const dx=p.x*SCALE-myX, dz=p.z*SCALE-myZ;
    const d=Math.sqrt(dx*dx+dz*dz);
    if(d<bestDist){bestDist=d;closest=p;}
  });
  const w=document.getElementById('nearby-wrap');
  if(closest){
    document.getElementById('nearby-name').textContent=closest.name;
    updateNearbyBar(closest.health);
    w.style.display='block'; gs.nearbyId=closest.id;
  } else { w.style.display='none'; gs.nearbyId=null; }
}
function updateNearbyBar(hp){
  const pct=Math.max(0,hp)/100;
  const f=document.getElementById('nearby-hfill');
  if(f){ f.style.width=(pct*100)+'%'; f.style.background=pct>0.5?'#2ecc40':pct>0.25?'#f39c12':'#e74c3c'; }
}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function doAction(){
  const slot=gs.inventory[gs.activeSlot]; if(!slot) return;
  if(slot.type==='weapon') shoot();
  else if(slot.type==='food') eat();
}
function shoot(){
  const dirX=-Math.sin(camYaw), dirZ=-Math.cos(camYaw);
  socket.emit('shoot',{x:myX/SCALE,z:myZ/SCALE,dirX,dirZ});
  // Hand recoil
  anim('hr','do-atkR',280); anim('hl','do-atkL',280);
}
function eat(){
  socket.emit('eatFood',gs.activeSlot);
  anim('hr','do-eat',450);
}
function doJump(){ if(!isJumping){isJumping=true;jumpV=6;} }
function swapSlot(i){
  gs.activeSlot=i;
  socket.emit('switchSlot',i);
  renderInv(); updateAmmoHud(); updateItemName();
}
function anim(id,cls,dur){ const el=document.getElementById(id); if(!el)return; el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); setTimeout(()=>el.classList.remove(cls),dur); }

// ═══════════════════════════════════════════════════
// HUD UPDATES
// ═══════════════════════════════════════════════════
function renderInv(){
  const icons=['🔫','🔮','🍖',null,null];
  const names=['Musket','Ammo','Meat','',''];
  gs.inventory.forEach((item,i)=>{
    const el=document.getElementById(`sl${i}`); if(!el) return;
    el.className='isl'+(i===gs.activeSlot?' active':'');
    if(item){
      el.innerHTML=`<span class="isl-icon">${item.icon||'?'}</span>${item.quantity!==undefined?`<span class="isl-qty">${item.quantity}</span>`:''}<span class="isl-name">${item.name||''}</span>`;
    } else { el.innerHTML=''; }
    el.onclick=()=>swapSlot(i);
  });
}

function updateAmmoHud(){
  const ammoSlot=gs.inventory.find(s=>s&&s.id==='musketammo');
  const cnt=document.getElementById('ammo-count');
  const lbl=document.getElementById('ammo-label');
  const activeItem=gs.inventory[gs.activeSlot];
  if(activeItem&&activeItem.type==='weapon'){
    if(cnt) cnt.textContent=ammoSlot?ammoSlot.quantity:0;
    if(lbl) lbl.textContent='ammo';
    document.getElementById('ammo-hud').style.display='block';
  } else {
    document.getElementById('ammo-hud').style.display='none';
  }
}

function updateItemName(){
  const item=gs.inventory[gs.activeSlot];
  const el=document.getElementById('item-name');
  if(el) el.textContent=item?item.name:'';
}

function updateBars(){
  drawRing('cHealth',gs.health/100,'#ff4444');
  drawRing('cHunger',gs.hunger/100,'#ff9500');
  const vh=document.getElementById('vHealth'); if(vh) vh.textContent=Math.round(gs.health);
  const vf=document.getElementById('vHunger'); if(vf) vf.textContent=Math.round(gs.hunger);
}
function drawRing(id,frac,color){
  const c=document.getElementById(id); if(!c) return;
  const ctx=c.getContext('2d'),cx=25,cy=25,r=21;
  ctx.clearRect(0,0,50,50);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=4; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*Math.max(0,frac));
  ctx.strokeStyle=color; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
}

function flashHit(){
  const f=document.getElementById('hit-flash');
  f.classList.add('on'); setTimeout(()=>f.classList.remove('on'),160);
}

// Kill feed
function addKillFeed(killer,victim,weapon){
  const kf=document.getElementById('killfeed');
  const d=document.createElement('div'); d.className='kf-entry';
  d.innerHTML=`<span class="kf-killer">${killer}</span> 🔫 <span class="kf-victim">${victim}</span>`;
  kf.appendChild(d);
  setTimeout(()=>{ if(d.parentNode) d.parentNode.removeChild(d); },4000);
  // Keep max 5
  while(kf.children.length>5) kf.removeChild(kf.firstChild);
}

// ═══════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════
let clockEl=null;
function startClock(){ clockEl=document.getElementById('clock-hud'); }
function updateClock(){
  if(!clockEl) return;
  const n=new Date();
  clockEl.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}

// Online count in-game
setInterval(()=>{
  const n=rooms.reduce((a,r)=>a+r.playerCount,0);
  const el=document.getElementById('online-hud');
  if(el) el.textContent=n+' Online';
},3000);

// ═══════════════════════════════════════════════════
// DEATH / RESPAWN
// ═══════════════════════════════════════════════════
function triggerDeath(by,weapon){
  gs.isDead=true;
  const ds=document.getElementById('death-screen');
  ds.classList.add('on');
  document.getElementById('death-msg').textContent=`${by} killed you with ${weapon}`;
  document.getElementById('death-cd').textContent='10';
  document.getElementById('btn-respawn').classList.remove('vis');
  gs.countdown=10;
  if(gs.deathTimer) clearInterval(gs.deathTimer);
  gs.deathTimer=setInterval(()=>{
    gs.countdown--;
    document.getElementById('death-cd').textContent=gs.countdown;
    if(gs.countdown<=0){
      clearInterval(gs.deathTimer);
      document.getElementById('death-cd').textContent='';
      document.getElementById('btn-respawn').classList.add('vis');
    }
  },1000);
}
function doRespawn(){
  gs.isDead=false;
  document.getElementById('death-screen').classList.remove('on');
  if(gs.deathTimer) clearInterval(gs.deathTimer);
  socket.emit('joinRoom',{roomId:gs.roomId,username:currentUser?.username||null});
}

// ═══════════════════════════════════════════════════
// SETTINGS / LEAVE
// ═══════════════════════════════════════════════════
function toggleCfg(){ document.getElementById('cfg-overlay').classList.toggle('on'); }
function leaveServer(){
  socket.emit('leaveRoom');
  if(animId){cancelAnimationFrame(animId);animId=null;}
  document.getElementById('cfg-overlay').classList.remove('on');
  gotoMenu();
}

// ═══════════════════════════════════════════════════
// TOAST / NOTIF
// ═══════════════════════════════════════════════════
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast'); if(!el) return;
  el.textContent=msg; el.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),3200);
}
let notifT=null;
function showNotif(msg){
  const el=document.getElementById('notif'); if(!el) return;
  el.textContent=msg; el.classList.add('on');
  clearTimeout(notifT); notifT=setTimeout(()=>el.classList.remove('on'),2600);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener('load',()=>{
  const s=localStorage.getItem('rv_sess');
  if(s){try{currentUser=JSON.parse(s);}catch(e){}}
  initSocket();
  gotoMenu();
  updateMainBtn();
  updateBars();
  document.addEventListener('contextmenu',e=>e.preventDefault());
});
</script>
